<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gas & Go POS</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- TOP BAR -->

<header class="topbar">


<h1>
⛽ Gas & Go POS
</h1>


<div class="admin-buttons">

<button 
onclick="openAdminDashboard()"
class="dashboard-btn">

⚙ Admin Dashboard

</button>

</div>


</header>





<!-- CATEGORY BUTTONS -->


<div class="categories">


<button onclick="changeCategory('Cold Drinks')">

🥤 Cold Drinks

</button>


<button onclick="changeCategory('Energy Drinks')">

⚡ Energy Drinks

</button>


<button onclick="changeCategory('Snacks')">

🍟 Snacks

</button>


<button onclick="changeCategory('Hot Food')">

🌭 Hot Food

</button>


<button onclick="changeCategory('Extras')">

➕ Extras

</button>


<button onclick="changeCategory('Gas')">

⛽ Gas

</button>


</div>





<!-- PRODUCTS -->

<div class="main">


<div class="products-section">


<h2>
Products
</h2>


<div id="products">

</div>


</div>

    
<!-- CART SECTION -->


<div class="cart-section">


<h2>
🛒 Cart
</h2>



<div id="cart">

</div>





<h2>

Total:
$

<span id="total">
0
</span>

</h2>





<!-- PAYMENT -->


<h3>
Payment Method
</h3>



<button onclick="setPayment('Cash')">

💵 Cash

</button>



<button onclick="setPayment('Card')">

💳 Card

</button>




<p>

Selected:

<span id="paymentMethod">

None

</span>


</p>







<!-- CASH INPUT -->


<input

id="cashInput"

type="number"

placeholder="Cash Amount"

>





<p>

Change:

$

<span id="change">

0

</span>


</p>









<!-- ORDER BUTTONS -->


<button 
onclick="finishOrder()"
class="finish-btn">

✅ Finish Order

</button>





<button 
onclick="clearCart()">

🗑 Clear Cart

</button>







<button 
onclick="openHistory()">

📜 Order History

</button>



</div>


</div>

    




<!-- RECEIPT MODAL -->


<div 
id="receiptModal"
class="modal">


<div class="modal-content">


<h2>
🧾 Receipt
</h2>



<pre id="receipt">

</pre>



<button onclick="printReceipt()">

🖨 Print

</button>




<button onclick="closeReceipt()">

Close

</button>



</div>


</div>









<!-- ORDER HISTORY MODAL -->


<div 
id="historyModal"
class="modal">


<div class="modal-content">


<h2>
📜 Order History
</h2>



<div id="historyList">

</div>




<button onclick="closeHistory()">

Close

</button>



</div>


</div>









<!-- FUEL MODAL -->


<div 
id="fuelModal"
class="modal">


<div class="modal-content">


<h2>
⛽ Fuel Purchase
</h2>




<select id="fuelType">


<option value="749">

Regular - $749/gal

</option>



<option value="829">

Plus - $829/gal

</option>



<option value="949">

Premium - $949/gal

</option>



<option value="1250">

Exclusive - $1250/gal

</option>



</select>







<input

id="gallons"

type="number"

placeholder="Gallons"

>





<button onclick="addFuel()">

Add Fuel

</button>





<button onclick="closeFuel()">

Cancel

</button>



</div>


</div>

    



<!-- SALE MESSAGE -->

<div 
id="saleMessage"
class="sale-message">


✅ Order Completed!


</div>







<!-- JAVASCRIPT -->

<script src="script.js"></script>



</body>

</html>
