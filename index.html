<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gas & Go POS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ADMIN BUTTONS -->

<div class="admin-buttons">

    <button onclick="openAdminDashboard()" class="dashboard-btn">
        ⚙ Admin Dashboard
    </button>

</div>


<header>

<h1>⛽ Gas & Go Cash Register</h1>

<div class="top-bar">

<input 
type="text" 
id="search"
placeholder="Search products..."
>

</div>

</header>



<div class="container">


<!-- CATEGORIES -->

<section class="categories">

<h2>Categories</h2>

<button onclick="showCategory('Cold Drinks')">
🥤 Cold Drinks
</button>

<button onclick="showCategory('Energy Drinks')">
⚡ Energy Drinks
</button>

<button onclick="showCategory('Snacks')">
🍟 Snacks
</button>

<button onclick="showCategory('Hot Food')">
🌭 Hot Food
</button>

<button onclick="showCategory('Extras')">
➕ Extras
</button>

<button onclick="showCategory('Gas')">
⛽ Gas & Car Wash
</button>

</section>




<!-- PRODUCTS -->

<section class="products">

<h2 id="categoryTitle">
Products
</h2>

<div id="productList">

</div>

</section>





<!-- CART -->

<section class="cart">


<h2>
🛒 Current Order
</h2>


<div id="cartItems">

<p>
No items added
</p>

</div>



<h3>
Total:
$<span id="total">0</span>
</h3>



<label>
Cash Received:
</label>


<input 
type="number" 
id="cashInput"
placeholder="Enter cash"
>



<h3>
Change:
$<span id="change">
0
</span>
</h3>



<button 
class="finish"
onclick="finishOrder()"
>
✅ Finish Order
</button>



<button 
class="clear"
onclick="clearCart()"
>
❌ Clear Order
</button>


<button 
onclick="openHistory()"
>
📜 Order History
</button>


</section>


</div>






<!-- RECEIPT WINDOW -->


<div 
id="receiptModal"
class="modal"
>


<div class="modal-content">


<h2>
Receipt
</h2>


<div id="receipt">

</div>


<button onclick="closeReceipt()">
Close
</button>


</div>

</div>







<!-- ADMIN LOGIN -->


<div 
id="adminLogin"
class="modal"
>


<div class="modal-content">


<h2>
Admin Login
</h2>


<input
type="password"
id="adminPassword"
placeholder="Password"
>


<button onclick="loginAdmin()">
Login
</button>


<button onclick="closeAdmin()">
Cancel
</button>


</div>

</div>








<!-- ADMIN DASHBOARD -->


<div 
id="adminPanel"
class="modal"
>


<div class="modal-content admin-panel">


<h2>
⚙ Admin Dashboard
</h2>



<button onclick="closeAdminPanel()">
Close
</button>


<hr>



<h3>
Add Product
</h3>


<input 
id="newProductName"
placeholder="Product name"
>


<input 
id="newProductPrice"
placeholder="Price"
type="number"
>


<select id="newProductCategory">

<option>
Cold Drinks
</option>

<option>
Energy Drinks
</option>

<option>
Snacks
</option>

<option>
Hot Food
</option>

<option>
Extras
</option>

<option>
Gas
</option>


</select>


<button onclick="addProduct()">
Add Product
</button>




<h3>
Products
</h3>


<div id="adminProducts">

</div>



</div>

</div>







<!-- ORDER HISTORY -->


<div 
id="historyModal"
class="modal"
>


<div class="modal-content">


<h2>
📜 Order History
</h2>


<div id="historyList">

</div>


<button onclick="closeHistory()">
Close
</button>


</div>


</div>





<script src="script.js"></script>


</body>
</html>

<!-- PAYMENT SECTION -->

<div class="payment-area">

<h3>
Payment Method
</h3>

<button onclick="setPayment('Cash')">
💵 Cash
</button>

<button onclick="setPayment('Card')">
💳 Card
</button>


<p>
Selected:
<span id="paymentMethod">
None
</span>
</p>


</div>





<!-- FUEL CALCULATOR -->

<div 
id="fuelModal" 
class="modal"
>

<div class="modal-content">

<h2>
⛽ Fuel Calculator
</h2>


<label>
Fuel Type
</label>


<select id="fuelType">

<option value="749">
Regular - $749/gal
</option>

<option value="829">
Plus - $829/gal
</option>

<option value="949">
Premium - $949/gal
</option>

<option value="1250">
Exclusive - $1250/gal
</option>

</select>



<label>
Gallons
</label>


<input 
type="number"
id="gallons"
placeholder="Amount of gallons"
>



<button onclick="addFuel()">
Add Fuel
</button>



<button onclick="closeFuel()">
Close
</button>


</div>

</div>







<!-- ADD FUEL BUTTON -->

<button 
class="fuel-button"
onclick="openFuel()"
>
⛽ Add Fuel
</button>






<!-- ADMIN PRODUCT EDIT TEMPLATE -->

<template id="adminProductTemplate">

<div class="admin-product">


<span class="admin-name">
Product
</span>


<input 
class="admin-price"
type="number"
>


<button class="save-price">
Save
</button>


<button class="delete-product">
Delete
</button>


</div>


</template>







<!-- SALE COMPLETE MESSAGE -->


<div 
id="saleMessage"
class="sale-message"
>

Order Completed!

</div>
