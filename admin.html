<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gas & Go Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

</head>


<body>



<!-- LOGIN -->

<div id="loginScreen">


<div class="admin-login">


<h1>
🔐 Admin Login
</h1>


<input
id="password"
type="password"
placeholder="Enter Password"
>


<button onclick="adminLogin()">
Login
</button>


<p id="loginError"></p>


</div>


</div>




<!-- DASHBOARD -->


<div id="dashboard" style="display:none;">



<header>


<h1>
⛽ Gas & Go Admin Panel
</h1>


<button onclick="location.href='index.html'">
⬅ Register
</button>


</header>




<div class="admin-layout">




<!-- SIDEBAR -->


<aside class="sidebar">


<button onclick="openTab('dashboardTab')">
🏠 Dashboard
</button>


<button onclick="openTab('productsTab')">
📦 Products
</button>


<button onclick="openTab('ordersTab')">
🧾 Orders
</button>


<button onclick="openTab('discountsTab')">
🎟 Discounts
</button>


<button onclick="openTab('analyticsTab')">
📊 Analytics
</button>


<button onclick="openTab('settingsTab')">
⚙ Settings
</button>



<button onclick="logoutAdmin()">
🚪 Logout
</button>


</aside>




<!-- CONTENT -->

<main class="admin-content">




<!-- DASHBOARD -->


<section id="dashboardTab" class="admin-tab">


<h2>
Overview
</h2>


<div class="cards">


<div class="card">

<h3>
Orders
</h3>

<p id="totalOrders">
0
</p>

</div>



<div class="card">

<h3>
Revenue
</h3>

<p id="totalRevenue">
$0
</p>

</div>




<div class="card">

<h3>
Products
</h3>

<p id="totalProducts">
0
</p>

</div>



</div>


</section>




<!-- PRODUCTS -->


<section id="productsTab" class="admin-tab" style="display:none;">



<h2>
📦 Product Management
</h2>




<input
id="productSearch"
placeholder="Search products..."
>




<h3>
Add Product
</h3>



<input
id="productName"
placeholder="Name"
>



<input
id="productPrice"
type="number"
placeholder="Price"
>




<select id="productCategory">


<option>
Cold Drinks
</option>

<option>
Energy Drinks
</option>

<option>
Snacks
</option>

<option>
Hot Food
</option>

<option>
Extras
</option>

<option>
Gas
</option>


</select>



<button onclick="addAdminProduct()">
Add Product
</button>




<hr>



<div id="adminProductList">

</div>



</section>




<!-- ORDERS -->


<section id="ordersTab" class="admin-tab" style="display:none;">


<h2>
🧾 Order History
</h2>

<input
id="orderSearch"
placeholder="Search username, user ID, or item..."
oninput="loadOrders()"
>


<div id="orders">

</div>



</section>




<!-- DISCOUNTS -->

<section id="discountsTab" class="admin-tab" style="display:none;">

<h2>🎟 Discount Management</h2>

<div class="discount-section">
  <h3>📋 Create Custom Discount Code (One-Time Use)</h3>
  
  <input 
    id="discountCode" 
    placeholder="Enter Code (e.g., SAVE50)"
    maxlength="20"
  >
  
  <input 
    id="discountPercent" 
    type="number" 
    placeholder="Discount %" 
    min="1" 
    max="100"
  >
  
  <button onclick="createDiscountCode()">
    ➕ Create Code
  </button>
</div>

<hr>

<div class="discount-section">
  <h3>🔑 Active Discount Codes</h3>
  <div id="discountCodesList"></div>
</div>

<hr>

<div class="discount-section">
  <h3>👮 Pre-Set Discounts (Staff)</h3>
  <div id="presetDiscountsList"></div>
</div>

</section>




<!-- ANALYTICS -->


<section id="analyticsTab" class="admin-tab" style="display:none;">


<h2>
📊 Analytics
</h2>

<button onclick="resetAnalytics()">
🔄 Reset Analytics
</button>

<div id="analytics">

</div>



</section>



<!-- SETTINGS -->


<section id="settingsTab" class="admin-tab" style="display:none;">



<h2>
⚙ Settings
</h2>



<button onclick="exportData()">
💾 Export Backup
</button>




<input 
type="file"
onchange="importData(event)"
>



<br><br>
  

</section>




</main>


</div>


</div>




</div>




<script src="admin.js"></script>


</body>

</html>
